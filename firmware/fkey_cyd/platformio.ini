; RGCS Frequency-Key CYD instrument firmware (v4.4, Agents A14-A19)
;
; STATUS: FIRMWARE_SOURCE_PROVIDED / NOT_COMPILED_IN_THIS_REPO.
; No ESP32 toolchain ran in this repository and no hardware exists.
; The Python simulator (fkey_instrument/device.py) implements the
; SAME state machine and API contract and is the tested twin; this
; tree is the hardware port awaiting a board and a build machine.
;
; Build (on a machine with PlatformIO):
;   pio run -e simulator_stub        # host-buildable logic check
;   pio run -e cyd_2432s028r         # ONLY after the board profile
;                                    # is verified by the self-test
;
; The board envs deliberately default to OUTPUT_DISABLED: you must
; set -DBOARD_VERIFIED=1 after completing the A14 questionnaire and
; matching the self-test report to the profile.

[platformio]
default_envs = simulator_stub

[env]
framework = arduino
monitor_speed = 115200
build_flags =
    -DFKEY_SCHEMA_VERSION=\"1.0.0\"
    -DOUTPUT_OFF_AT_BOOT=1

[env:simulator_stub]
; host-side logic compilation stub (no hardware peripherals): proves
; the core FSM/recipe code is self-contained C++
platform = native
framework =
build_flags =
    ${env.build_flags}
    -DFKEY_SIMULATOR=1
    -std=gnu++17

[env:cyd_2432s028r]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -DBOARD_PROFILE_2432S028R=1
    ; BOARD_VERIFIED must be set by a human after the A14 self-test
    ; matches; without it the output driver compiles to a no-op
    ; -DBOARD_VERIFIED=1

[env:cyd_2432s024c]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -DBOARD_PROFILE_2432S024C=1
