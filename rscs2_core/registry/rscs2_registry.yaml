    doc_target: "V4_REFERENCE_SYSTEMS_SPEC"
    status: "analytic reference + solver reproduction VALIDATED (M3)"
  - id: RSCS2-V.3
    name: Timoshenko cantilever correction
    class: EST
    units: "Hz"
    signature: "(E, G, rho, L, w, t, k', n) -> f_n"
    module: "rscs2_core.reference:timoshenko_cantilever_hz"
    provenance: ["Timoshenko beam theory"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_reference.py::test_timoshenko_reduces_to_eb"]
    doc_target: "V4_REFERENCE_SYSTEMS_SPEC"
    status: "analytic + SOLVER VALIDATED: thick-beam z-bend +0.03% vs Timoshenko (test_thick_beam_timoshenko)"
  - id: RSCS2-V.6
    name: alpha-quartz Christoffel ladder (conservative extension)
    class: EST
    units: "Hz"
    signature: "constrained quartz bar along Z: f_n = n * vZ_frozen / (2L)"
    module: "rscs2_core.fem:assemble_anisotropic"
    provenance: ["frozen rgcs_core.anisotropy wave_speeds (RSCS-O.17)"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_christoffel_anchor_quartz"]
    doc_target: "V4_REFERENCE_SYSTEMS_SPEC"
    status: "VALIDATED: FEM ladder matches frozen v3 speed (rtol 1e-3)"
  - id: RSCS2-V.8
    name: mesh-refinement convergence
    class: EST
    units: "relative error"
    signature: "err(EB) strictly decreasing over 3 refinement levels"
    module: "rscs2_core.fem:solve_modes"
    provenance: ["FEM convergence theory"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_mesh_convergence"]
    doc_target: "V4_TEST_PLAN"
    status: "VALIDATED: monotone, final err < 0.5%"
  - id: RSCS2-V.5
    name: isotropic cube exact Lame mode
    class: EST
    units: "Hz"
    signature: "free-cube spectrum contains f = v_s/(sqrt(2) a), nu-independent"
    module: "rscs2_core.reference:cube_lame_mode_hz"
    provenance: ["exact classical solution; Demarest JASA 49, 768 (1971) 8-digit check"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_cube_lame_mode_v5"]
    doc_target: "V4_REFERENCE_SYSTEMS_SPEC"
    status: "VALIDATED: +0.03-0.05% at nu=0.25 and 0.33; nu-independence confirmed"
  - id: RSCS2-V.4
    name: conventional reference systems (cavity + tuning fork)
    class: EST
    units: 'Hz'
    signature: 'rigid-wall cavity vs EXACT closed form; base-fixed fork sym/antisym pair + common-mode rejection'
    module: 'rscs2_core.refsystems'
    provenance: ['exact Helmholtz rectangular-cavity solution; classical tuning-fork mode structure']
    exclusions: ['fork pair regime is base-FIXED (weak coupling); free fork is strong-coupling (documented)']
    tests: ['tests/v4/test_rscs2_refsystems.py::test_cavity_exact_reference', 'tests/v4/test_rscs2_refsystems.py::test_cavity_degeneracy_in_cube', 'tests/v4/test_rscs2_refsystems.py::test_fork_symmetric_antisymmetric_and_cmr']
    doc_target: 'V4_REFERENCE_SYSTEMS_SPEC'
    status: 'VALIDATED: cavity FEM within 1.7e-4 of exact incl. 3-fold cube degeneracy; fork pair S0=8.70 Hz on 1237.8 Hz, CMR ratio 0.26'
  - id: RSCS2-V.9
    name: avoided-crossing anchor vs frozen two-mode model (conservative extension)
    class: EST
    units: 'Hz'
    signature: 'tip-mass detuned fork pair: FEM splitting vs frozen S = sqrt(Delta^2 + S0^2)'
    module: 'rscs2_core.refsystems + rgcs_core.coupled_modes.static:coupled_two_mode'
    provenance: ['FROZEN RSCS-O.4 / RGCS-M.24 (DV4-009)']
    exclusions: ['detuning mapped via Rayleigh tip-mass formula (m_eff = 0.2427 m_prong)']
    tests: ['tests/v4/test_rscs2_refsystems.py::test_v9_avoided_crossing_anchor_frozen_model']
    doc_target: 'V4_REFERENCE_SYSTEMS_SPEC'
    status: 'VALIDATED: frozen model tracks FEM splitting within 6.4% over detuning sweep 0..10.7 Hz (evidence/v4/agent10/avoided_crossing_v9.*)'
