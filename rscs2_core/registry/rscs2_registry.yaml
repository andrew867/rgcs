# Machine-readable RSCS 2.0 registry (RGCS v4). Append-only; new ids
# registered here before first use (governance path, DV4-002). Does NOT
# alter the frozen RGCS-M / RSCS-C / RSCS-O registries.
#
# Namespaces (DV4-002): RSCS2-E (equations), RSCS2-G (geometry/mesh),
# RSCS2-B (boundary), RSCS2-S (solver), RSCS2-A (accelerator),
# RSCS2-D (diagnostics), RSCS2-V (benchmarks), RSCS2-U (uncertainty/inverse).
schema_version: 1
model_version: "RSCS-2.0-dev"

# Only objects with a SHIPPED, TESTED implementation are listed. The full
# planned id set lives in docs/plans-v4/V4_MATHEMATICAL_MODEL_PLAN.md and
# is registered here as each is implemented and validated.
equations:
  - id: RSCS2-E.1
    name: linear elastodynamic eigenproblem
    class: EST
    units: "Pa, kg/m^3 -> Hz"
    signature: "div(sigma) + rho*omega^2*u = 0; K u = omega^2 M u"
    module: "rscs2_core.fem:assemble_isotropic"
    provenance: ["continuum mechanics (Landau-Lifshitz; Achenbach)"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_cantilever_eb_benchmark"]
    doc_target: "V4_CPU_SOLVER_SPEC"
    status: "implemented + validated (M3 benchmarks green)"
  - id: RSCS2-E.2
    name: isotropic constitutive (Lame)
    class: EST
    units: "Pa"
    signature: "sigma = lam*tr(eps)*I + 2*mu*eps"
    module: "rscs2_core.fem:assemble_isotropic"
    provenance: ["standard; skfem linear_elasticity model"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_isotropic_constrained_bar_pwave"]
    doc_target: "V4_CPU_SOLVER_SPEC"
    status: "implemented + validated"
  - id: RSCS2-E.3
    name: anisotropic constitutive (full tensor)
    class: EST
    units: "Pa"
    signature: "sigma_ij = C_ijkl eps_kl; C from frozen Voigt via voigt_to_tensor"
    module: "rscs2_core.fem:assemble_anisotropic"
    provenance: ["frozen rgcs_core.anisotropy (Bechmann 1958; Auld 1973)"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_christoffel_anchor_quartz", "tests/v4/test_rscs2_quartz.py::test_christoffel_matches_frozen_v3_on_sweep", "tests/v4/test_rscs2_quartz.py::test_rotation_identity_inverse_composition", "tests/v4/test_rscs2_quartz.py::test_trigonal_symmetry_and_known_rotation"]
    doc_target: "V4_ANISOTROPIC_QUARTZ_SPEC"
    status: "implemented + validated (conservative-extension anchor V.6 green)"
  - id: RSCS2-E.5
    name: linear piezoelectric coupling (stress-charge form)
    class: EST
    units: 'C/m^2, F/m, Pa -> Hz'
    signature: 'sigma=C:S-e^T.E; D=e:S+eps.E; block [[Kuu,Kup],[Kup^T,-Kpp]]'
    module: 'rscs2_core.piezo:PiezoProblem'
    provenance: ['IEEE 176; Bechmann 1958 (e11=0.171, e14=-0.0406 C/m^2; eps11=4.428, eps33=4.634 rel)']
    exclusions: ['no accuracy claim beyond supplied tensors/BCs']
    tests: ['tests/v4/test_rscs2_piezo.py::test_single_element_energy_patch', 'tests/v4/test_rscs2_piezo.py::test_zero_piezo_reduces_exactly_to_elastic', 'tests/v4/test_rscs2_piezo.py::test_open_ge_short_and_extensional_coupling']
    doc_target: 'V4_PIEZOELECTRIC_MULTIPHYSICS_SPEC'
    status: 'implemented + validated (energy patch 1e-9; zero-e reduction 1e-9; k_eff^2 physical order)'
  - id: RSCS2-E.8
    name: anisotropic refractive index + ray projection (optical)
    class: EST
    units: 'dimensionless, mm, rad'
    signature: 'Ghosh 1999 Sellmeier n_o/n_e(lambda); uniaxial n(theta); vector Snell; probe paths via frozen ray_to_target'
    module: 'rscs2_core.projections'
    provenance: ['Ghosh 1999 Opt. Commun. 163, 95; frozen rgcs_core.optics (D6-002)']
    exclusions: ['plane-wave indices only: double-refraction walk-off NOT modelled (declared, fail-loud)', 'octave wavelength presets are ARITHMETIC, no coupling claim']
    tests: ['tests/v4/test_rscs2_projections.py::test_sellmeier_reproduces_frozen_indices_at_sodium_d', 'tests/v4/test_rscs2_projections.py::test_vector_snell_matches_frozen_scalar_and_tir', 'tests/v4/test_rscs2_projections.py::test_probe_paths_reciprocity_and_target_menu']
    doc_target: 'V4_OPTICAL_MODELLING_SPEC'
    status: 'implemented + validated (Sellmeier anchors frozen constants at 589.3 nm within 2e-4)'
  - id: RSCS2-E.9
    name: photoelastic phase projection (strain -> probe phase)
    class: EST
    units: 'rad'
    signature: 'dphi = (2 pi/lambda) sum dn(S_i) L_i, dn = -1/2 n^3 p S (frozen)'
    module: 'rscs2_core.projections:photoelastic_phase_shift_rad'
    provenance: ['frozen rgcs_core.optics.photoelastic_index_shift; Narasimhamurty p constants']
    exclusions: ['magnitude projection for H-20; no measured-sideband claim']
    tests: ['tests/v4/test_rscs2_projections.py::test_photoelastic_projection_closed_form']
    doc_target: 'V4_OPTICAL_MODELLING_SPEC'
    status: 'implemented + validated (closed form + frozen docstring anchor)'
  - id: RSCS2-E.10
    name: quasi-static coil field (Biot-Savart polyline)
    class: EST
    units: 'T'
    signature: 'Hanson-Hirshman stable segment form; opposed pair w/ frozen coil_pair_phases + winding handedness'
    module: 'rscs2_core.projections:biot_savart_polyline'
    provenance: ['Biot-Savart (standard); Hanson & Hirshman 2002; frozen rgcs_core.timing coil model']
    exclusions: ['magnetoquasistatic (<< self-resonance); no toroidal eye assumed; leakage control REQUIRED for any coupling record']
    tests: ['tests/v4/test_rscs2_projections.py::test_biot_savart_loop_vs_exact_on_axis', 'tests/v4/test_rscs2_projections.py::test_coil_pair_opposed_vs_in_phase', 'tests/v4/test_rscs2_projections.py::test_coupling_report_requires_leakage_control']
    doc_target: 'V4_COIL_AND_EM_COUPLING_SPEC'
    status: 'implemented + validated (exact on-axis anchor 1e-4; div B = 0)'
  - id: RSCS2-E.11
    name: modal drive projection
    class: EST
    units: 'N (generalized)'
    signature: 'f_n = int phi_n . b dV on mass-orthonormal modes'
    module: 'rscs2_core.projections:assemble_body_force+project_force_vector'
    provenance: ['standard modal projection']
    exclusions: ['projection onto modes, NOT an electromechanical field solve']
    tests: ['tests/v4/test_rscs2_projections.py::test_modal_drive_projection_orthonormality']
    doc_target: 'V4_COIL_AND_EM_COUPLING_SPEC'
    status: 'implemented + validated (M phi_k projects to exactly e_k)'
solver:
  - id: RSCS2-S.1
    name: sparse generalized eigensolve
    class: EST
    units: "Hz"
    signature: "(ElasticProblem, n, fixed_dofs) -> frequencies, modes, residuals"
    module: "rscs2_core.fem:solve_modes"
    provenance: ["scipy.sparse.linalg.eigsh shift-invert"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_mesh_convergence"]
    doc_target: "V4_CPU_SOLVER_SPEC"
    status: "implemented + validated"
  - id: RSCS2-S.2
    name: rigid-body mode handling
    class: EST
    units: "count"
    signature: "modes < RIGID_MODE_TOL_HZ classified rigid, reported separately"
    module: "rscs2_core.fem:solve_modes"
    provenance: ["standard modal analysis"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_free_body_rigid_modes_and_mass_patch"]
    doc_target: "V4_CPU_SOLVER_SPEC"
    status: "implemented + validated (6 rigid modes on free body)"
  - id: RSCS2-S.4
    name: modal residual check
    class: DER
    units: "dimensionless"
    signature: "||K u - w^2 M u|| / ||w^2 M u|| per mode"
    module: "rscs2_core.fem:solve_modes"
    provenance: ["standard"]
    exclusions: []
    tests: ["tests/v4/test_rscs2_solver.py::test_cantilever_eb_benchmark"]
    doc_target: "V4_CPU_SOLVER_SPEC"
    status: "implemented + validated (residuals < 1e-6)"
benchmarks:
  - id: RSCS2-V.1
    name: free-free longitudinal rod
    class: EST
    units: "Hz"
    signature: "(E, rho, L, n) -> f_n"
