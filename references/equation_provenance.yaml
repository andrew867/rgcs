  # ---- SRC-3-04  Wang et al. (10.1038/s41377-024-01692-y) ----
  - prov_id: EP-04-01
    source_id: SRC-3-04
    location: {page: 2, eq: "1"}
    name: "Anti-symmetric (gyrotropic) susceptibility tensor"
    printed_form: "(Dx,Dy) ∝ [[χxx, iχxy],[-iχxy, χyy]] (Ex,Ey); χxy ≠ 0 => non-reciprocal (anti-symmetric under time reversal)"
    domain: "atomic (Rb) optical medium; circular birefringence/dichroism"
    reusable_math: "anti-symmetric off-diagonal coupling tensor as the algebraic signature of nonreciprocity/time-reversal breaking"
    allowed_adaptation: "algebraic form of an anti-Hermitian/anti-symmetric coupling as an RGCS nonreciprocity indicator (consistent with the frozen K = i·2πg convention)"
    forbidden_transfer: "the medium is atomic vapor; no claim quartz has a self-induced χxy"
    target_rscs: "RSCS coupling: nonreciprocity (anti-symmetric coupling) predicate"
  - prov_id: EP-04-02
    source_id: SRC-3-04
    location: {page: 2, eq: "2"}
    name: "Nonlinear (signal-induced) non-reciprocal susceptibility expansion"
    printed_form: "χxy = χ^(1)_xy (B·e_z) + χ^(3)_xy (E×E*)·e_z + ...  ; the χ^(3) term depends on the field's local spin E×E*"
    domain: "same; third-order optical nonlinearity"
    reusable_math: "expansion of a coupling coefficient in a bias term plus a state-dependent (self-induced) term proportional to field spin E×E*"
    allowed_adaptation: "template for a state-dependent RGCS coupling: coupling = bias + f(drive state). Circular-polarization/spin state E×E* -> RGCS state-preparation coordinate."
    forbidden_transfer: "no import of the physical claim that a signal self-induces nonreciprocity in quartz"
    target_rscs: "RSCS state_preparation + coupling: state-dependent coupling coordinate"
  - prov_id: EP-04-03
    source_id: SRC-3-04
    location: {page: 2, eq: "text after (2)"}
    name: "Nonreciprocal transmittance, phase, and isolation"
    printed_form: "counter-propagating power transmittance = e^{-4k Im(χxy) L}; nonreciprocal phase φ = 2k Re(χxy) L"
    domain: "same"
    reusable_math: "Beer-law isolation from Im(coupling); reciprocity-breaking phase from Re(coupling); both linear in interaction length L"
    allowed_adaptation: "isolation/nonreciprocal-phase metrics as functions of a complex coupling and path length"
    forbidden_transfer: "atomic-vapor performance stays the paper's"
    target_rscs: "RSCS observation: isolation + nonreciprocal-phase metrics"

