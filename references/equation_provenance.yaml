# Equation-level provenance ledger — RGCS v3 / RSCS 1.0 (Agent 02, Task 4)
#
# Every reusable equation/method extracted from the source PDFs, with exact
# location (page + the paper's own equation number where printed), original
# physical domain, the mathematical adaptation permitted, the interpretation
# transfer that is FORBIDDEN, and the target RSCS operator/coordinate it feeds.
#
# Rules (orchestrator integration + Quality Gates 2,4):
#   - Locations verified against the extracted page text on 2026-07-14.
#   - An equation may enter an RSCS document only after it also receives a
#     registry ID (RSCS-O.* / RSCS-C.*), canonical units, a dimensional
#     check, and a machine test. Those IDs are assigned by Agents 03/06;
#     this ledger only fixes provenance and the allow/forbid boundary.
#   - "target_rscs" names the intended home operator/coordinate; it is a
#     reservation, not yet an implemented equation.
schema_version: 1
equations:

  # ---- SRC-3-01  Sohn, Orsel & Bahl (arXiv:2104.04803v2) ----
  - prov_id: EP-01-01
    source_id: SRC-3-01
    location: {page: 13, eq: "S1"}
    name: "Two-mode coupled equations of motion (WGR + waveguide), driven"
    printed_form: "d/dt (a1,a2)^T = M (a1,a2)^T + (sqrt(kex1), sqrt(kex2))^T s_in e^{-i w_l t}; M diagonal = -i w_j - k_j/2, off-diagonal = i (Gph/2) e^{±i Ω t}"
    domain: "lithium-niobate whispering-gallery optomechanics; TE00/TE10 optical modes coupled by an acoustic phonon"
    reusable_math: "driven two-mode complex dynamics with anti-Hermitian off-diagonal coupling and modal decay k_j; time-dependent (parametric) coupling e^{±iΩt}"
    allowed_adaptation: "structural template for a driven two-mode RGCS resonator pair; maps onto the frozen anti-Hermitian coupling convention K = i·2πg (QA-D-04). Substitutions: a_j -> RGCS complex modal amplitudes; Gph -> RGCS coupling magnitude; κ_j -> γ_n damping."
    forbidden_transfer: "no claim that quartz hosts acousto-optic ATS, WGR modes, or the reported 39 dB isolation; device numbers stay with the paper"
    target_rscs: "RSCS coupling operator (two-mode); consistency-tested against rgcs_core.coupled_modes (RGCS-M.23-24,46)"
  - prov_id: EP-01-02
    source_id: SRC-3-01
    location: {page: 14, eq: "S4"}
    name: "Autler-Townes dressed-state splitting of the cavity susceptibility"
    printed_form: "a2,0 = [ (sqrt(kex2)/2)/(k/2 - i(Δ + Gph/2)) + (sqrt(kex2)/2)/(k/2 - i(Δ - Gph/2)) ] s_in ; peaks split by Gph"
    domain: "same; degenerate/matched-loss limit κ1=κ2=κ, δ=0"
    reusable_math: "two-Lorentzian split response; strong-coupling threshold Gph >> κ (main text: Gph > sqrt(κ1κ2)); |split| = Gph (Rabi frequency)"
    allowed_adaptation: "template for RGCS avoided-crossing / strong-coupling threshold and linewidth relations; parallels RGCS-M.24-27 (hybrid eigenfrequencies, mixing angle, linewidth, strong-coupling ratio)"
    forbidden_transfer: "the physical splitting is optical; not evidence for a quartz acoustic ATS effect"
    target_rscs: "RSCS observation-layer lineshape; ties to RGCS-M.24/M.27"
  - prov_id: EP-01-03
    source_id: SRC-3-01
    location: {page: 15, eq: "S6"}
    name: "Critical-coupling transmission zero"
    printed_form: "s_out,0 = s_in (1 - kex2/(k2/2 - iΔ)); transmission vanishes at Δ=0 when κ2/2 = κex2, i.e. κint2 = κex2"
    domain: "non-phase-matched direction, Gph=0"
    reusable_math: "critical-coupling condition (intrinsic loss = external coupling); insertion-loss/isolation contrast metric"
    allowed_adaptation: "definition of critical coupling for RGCS drive/readout coupling budgets"
    forbidden_transfer: "device insertion-loss/contrast values are the paper's"
    target_rscs: "RSCS observation: coupling/insertion-loss metric"

  # ---- SRC-3-02  Cheng et al. (arXiv:2403.10628v1) ----
  - prov_id: EP-02-01
    source_id: SRC-3-02
    location: {page: 10, eq: "S.1, S.2"}
    name: "Acousto-optic phase-matching condition and phase mismatch"
    printed_form: "k+(w0) + q(Ω) = k-(w0+Ω) (S.1); Δq_pm(ω) = (n_g,+ - n_g,-)/c · (ω - ω0) (S.2)"
    domain: "integrated acousto-optic frequency-shifting beam splitter; symmetric(+)/antisymmetric(-) waveguide supermodes"
    reusable_math: "momentum/phase matching between two modes via a coupling wave of wavevector q; mismatch linear in detuning through group-index difference; response ∝ sinc^2(Δq_pm La/2)"
    allowed_adaptation: "phase/momentum-matching bookkeeping for RGCS mode-conversion drive design; group-index-difference -> RGCS group-delay balancing variable"
    forbidden_transfer: "no claim quartz realizes THz-bandwidth optical isolation or CMOS-photonic beam splitters"
    target_rscs: "RSCS coupling/propagation: phase-matching predicate + mismatch coordinate"
  - prov_id: EP-02-02
    source_id: SRC-3-02
    location: {page: 12, eq: "S.5, S.6"}
    name: "AOM-section transfer matrix (parity basis)"
    printed_form: "t_a^f(φ_RF) 2x2 with r(ω)e^{iφr} ≡ cos(βLa) + i(Δq_pm/2β) sin(βLa), μ(ω)e^{iφ_RF} ≡ (g b / sqrt(v1 v2)) sin(βLa), r^2+μ^2=1; β = sqrt((Δq_pm/2)^2 + |bg|^2/(v+ v-))"
    domain: "same; transfer matrix in the {|+>,|->} symmetric/antisymmetric basis"
    reusable_math: "unitary 2x2 transfer matrix; RF phase φ_RF as a controllable coupling phase; conserved r^2+μ^2=1"
    allowed_adaptation: "transfer-matrix formalism and parity (symmetric/antisymmetric) basis for RGCS multi-section couplers; drive-phase control variable"
    forbidden_transfer: "acoustic field b, group velocities v±, and device geometry stay optical-domain"
    target_rscs: "RSCS transforms: cascadable transfer-matrix operator; parity basis in RSCS modes"
  - prov_id: EP-02-03
    source_id: SRC-3-02
    location: {page: 12, eq: "S.7, S.8"}
    name: "Delay-region matrix and forward/backward interference (group-delay balancing)"
    printed_form: "t_delay = diag(e^{i k_{d,+} L_{d,+}}, e^{i k_{d,-} L_{d,-}}); cascade t_a^f(φRF2)·t_delay·t_a^f(φRF1) gives direction-dependent output; fringe period set by group-delay difference"
    domain: "same; nonreciprocal multimode interferometer"
    reusable_math: "cascaded transfer matrices; group-delay/dispersion balancing to widen the reciprocity-breaking bandwidth; direction dependence via RF phase ordering"
    allowed_adaptation: "group-delay balancing as an RGCS design objective; directionality from asymmetric drive-phase sequence"
    forbidden_transfer: "no import of nonreciprocity/isolation as an intrinsic quartz property"
    target_rscs: "RSCS propagation: group-delay coordinate + nonreciprocal cascade operator"

