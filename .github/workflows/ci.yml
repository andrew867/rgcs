# RGCS v3 CI (MIG-CODE-07: Windows CI requirement).
# Matrix: Linux (release/reference platform) + Windows (portability gate).
# The one known platform-sensitive test (NR3-001, byte-equality of
# Linux-generated golden CSVs) is deselected on Windows and documented in
# docs/V2_BASELINE_AUDIT.md; everything else must pass on BOTH platforms.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .[dev] && python -m pip install pypdf
      - name: Schema validation
        run: python experiments/schemas/validate.py
      - name: Generated-docs freshness
        run: python tools/generate_optical_comparison.py --check
      - name: Tests (Linux, full)
        if: runner.os == 'Linux'
        run: python -m pytest -q
      - name: Tests (Windows, golden byte-equality deselected per NR3-001)
        if: runner.os == 'Windows'
        run: python -m pytest -q --deselect tests/regression/test_generator_determinism.py::test_generator_deterministic
