[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rgcs-v2"
version = "2.0.0"
description = "RGCS v2 computational core (rgcs_core): deterministic, typed, tested library for resonant-geometry crystal studies."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Andrew Green", email = "me@andrewgreen.ca" }]
dependencies = [
    "numpy>=1.26",
    "scipy>=1.11",
    "pydantic>=2.5",
]

[project.optional-dependencies]
desktop = ["PySide6>=6.6", "pyqtgraph>=0.13"]
dev = ["pytest>=7.4", "hypothesis>=6.90", "pytest-qt>=4.2"]

[tool.setuptools.packages.find]
include = ["rgcs_core*", "rgcs_desktop*"]

[tool.pytest.ini_options]
testpaths = ["tests/unit", "tests/property", "tests/golden", "tests/regression", "tests/ui", "tests/integration"]
pythonpath = ["."]
markers = [
    "slow: long-running tests (dataset regeneration)",
    "benchmark: non-gating performance checks",
]
